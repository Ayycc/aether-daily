name: Daily article refresh

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Refresh articles
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          node scripts/refresh-articles.mjs
          node scripts/sanitize-x-urls.mjs
          node scripts/check-x-urls.mjs

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json loop/state.md
          if git diff --staged --quiet; then
            echo "No article changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh Aether Daily articles [edition $(node -p "require('./data/articles.json').edition")]"
          git push
