            openedFromCategory = false;
            
            const page = document.getElementById('category-page');
            const titleEl = document.getElementById('category-page-title');
            const subtitleEl = document.getElementById('category-page-subtitle');
            const articlesContainer = document.getElementById('category-articles');

            titleEl.textContent = category;
            subtitleEl.textContent = 'TOP STORIES';

            const categoryArticles = articles
                .filter(a => a.category === category)
                .sort((a, b) => b.likes - a.likes);

            let html = '';
            categoryArticles.forEach(article => {
                html += `
                    <div onclick="showArticleFromCategory(${article.id})" class="vintage-paper article-card rounded-2xl px-5 py-5 mb-2 cursor-pointer border border-[#3a3630]">
                        <div class="flex justify-between items-start mb-2">
                            <span class="px-3 py-px text-xs font-bold tracking-widest bg-[#e8d9c2] text-[#12110f] rounded">${article.category}</span>
                            <div class="flex items-center gap-1 text-red-600 text-sm font-semibold">
                                <i class="fa-solid fa-heart"></i>
                                <span>${(article.likes / 1000).toFixed(1)}k</span>
                            </div>
                        </div>
                        
                        <h3 class="vintage-headline text-2xl leading-none text-[#e8d9c2] pr-4">${article.headline}</h3>
                        
                        <p class="mt-3 text-[14.5px] text-[#c5b8a3] line-clamp-3">${article.summary}</p>
                        
                        <div class="flex items-center justify-between mt-4 text-xs">
                            <div>
                                <span class="font-semibold text-[#e8d9c2]">${article.author}</span>
                                <span class="text-[#8b5e3c]"> • ${article.timestamp}</span>
                            </div>
                            <span class="text-[#8b5e3c] font-medium">${article.handle}</span>
                        </div>
                    </div>
                `;
            });

            articlesContainer.innerHTML = html;
            page.style.display = 'block';
            page.classList.add('page-turn');
            setTimeout(() => page.classList.remove('page-turn'), 700);
        }

        function closeCategoryPage() {
            document.getElementById('category-page').style.display = 'none';
        }

        function showArticleFromCategory(id) {
            openedFromCategory = true;
            closeCategoryPage();
            setTimeout(() => showArticle(id), 180);
        }

        function showArticle(id) {
            currentArticle = articles.find(a => a.id === id);
            if (!currentArticle) return;
            
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            
            content.innerHTML = `
                <div>
                    <span class="px-4 py-1 text-xs font-bold tracking-widest bg-[#e8d9c2] text-[#12110f] rounded">${currentArticle.category}</span>
                </div>
                
                <h1 class="vintage-headline text-4xl leading-none mt-4 text-[#e8d9c2]">
                    ${currentArticle.headline}
                </h1>
                
                <p class="mt-2 text-2xl text-[#c5b8a3] font-medium tracking-tight">${currentArticle.subheadline}</p>
                
                <div class="flex justify-between items-center my-7 text-sm border-y border-[#3a3630] py-4">
                    <div>
                        <div class="font-bold">${currentArticle.author}</div>
                        <div class="text-[#8b5e3c]">${currentArticle.handle}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[#8b7f6e]">${currentArticle.timestamp}</div>
                        <div class="flex items-center justify-end gap-1 mt-0.5 text-red-600 font-bold">
                            <i class="fa-solid fa-heart"></i>
                            <span>${currentArticle.likes.toLocaleString()}</span>
                        </div>
                    </div>
                </div>
                
                <div class="prose text-[#e8d9c2] leading-[1.7]">
                    <p>${currentArticle.summary}</p>
                    <div class="mt-8 text-xs text-[#8b7f6e] border-t border-[#3a3630] pt-4">
                        This dispatch was sourced from X and reflects the most discussed developments in artificial intelligence.
                    </div>
                </div>
            `;
            
            document.getElementById('x-button').style.display = 'flex';
            updateNavButtons();
            modal.style.display = 'flex';
        }
        
        function updateNavButtons() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            if (!currentArticle) return;
            
            const currentIndex = articles.findIndex(a => a.id === currentArticle.id);
            prevBtn.style.opacity = currentIndex > 0 ? '1' : '0.3';
            prevBtn.style.pointerEvents = currentIndex > 0 ? 'auto' : 'none';
            nextBtn.style.opacity = currentIndex < articles.length - 1 ? '1' : '0.3';
            nextBtn.style.pointerEvents = currentIndex < articles.length - 1 ? 'auto' : 'none';
        }

        function navigateArticle(direction) {
            if (!currentArticle) return;
            const currentIndex = articles.findIndex(a => a.id === currentArticle.id);
            const newIndex = currentIndex + direction;
            if (newIndex >= 0 && newIndex < articles.length) {
                showArticle(articles[newIndex].id);
            }
        }
        
        function hideModal() {
            document.getElementById('modal').style.display = 'none';
            if (openedFromCategory && currentCategory) {
                setTimeout(() => {
                    openCategoryPage(currentCategory);
                    openedFromCategory = false;
                }, 200);
            }
        }
        
        function openOnX() {
            if (currentArticle?.xURL) {
                window.open(currentArticle.xURL, '_blank');
            }
        }

        function init() {
            setDate();
            console.log('%c[Aether Daily] X button restored with box and proper scaling.', 'color:#8b7f6e');
        }

        window.onload = init;
    </script>
</body>
</html>
