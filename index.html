<html lang="en">

    <meta name="apple-mobile-web-app-title" content="Aether Daily">

    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxOTInIGhlaWdodD0nMTkyJyB2aWV3Qm94PScwIDAgMTkyIDE5Mic+PHJlY3Qgd2lkdGg9JzE5MicgaGVpZ2h0PScxOTInIGZpbGw9JyMxMjExMGYnLz48cmVjdCB4PScyMCcgeT0nMjAnIHdpZHRoPScxNTInIGhlaWdodD0nMTUyJyBmaWxsPSdub25lJyBzdHJva2U9JyNmNGU5ZDgnIHN0cm9rZS13aWR0aD0nMTInLz48dGV4dCB4PSc5NicgeT0nMTEwJyBmb250LWZhbWlseT0nUGxheWZhaXIgRGlzcGxheScgZm9udC1zaXplPSc3MCcgZm9udC13ZWlnaHQ9JzkwMCcgZmlsbD0nI2Y0ZTlkOCcgdGV4dC1hbmNob3I9J21pZGRsZSc+QURUPC90ZXh0Pjwvc3ZnPg==">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Source+Sans+3:wght@400;500;600&amp;display=swap');
        
        body {
            font-family: 'Source Sans 3', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #12110f;
            color: #e8d9c2;
        }

        .safe-area-top {
            padding-top: max(0.75rem, env(safe-area-inset-top, 0px));
        }

        .safe-area-x {
            padding-left: max(1.25rem, env(safe-area-inset-left, 0px));
            padding-right: max(1.25rem, env(safe-area-inset-right, 0px));
        }

        .safe-area-bottom {
            padding-bottom: max(1rem, env(safe-area-inset-bottom, 0px));
        }

        .category-back-btn {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-left: -0.5rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
        }
        
        .vintage-paper {
            background: #1f1d1a;
            box-shadow: 0 0 0 1px #3a3630,
                        0 10px 30px -15px rgba(0,0,0,0.5);
        }

        .masthead {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 900;
            font-size: clamp(2.25rem, 11vw, 4.5rem);
            letter-spacing: clamp(0.06em, 2vw, 0.25em);
            text-shadow: 2px 2px 0 #3a3630;
            max-width: 100%;
            text-align: center;
            white-space: nowrap;
        }

        .masthead-daily {
            font-size: clamp(1.75rem, 9vw, 3.75rem);
            letter-spacing: clamp(0.08em, 1.5vw, 0.2em);
        }

        .vintage-headline {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -0.025em;
        }

        .section-header {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            letter-spacing: 0.3em;
            font-size: 13px;
            color: #8b7f6e;
        }

        .article-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #3a3630;
        }
        
        .article-card:active {
            transform: translateY(1px);
        }

        .category-widget {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #3a3630;
        }
        
        .category-widget:active {
            transform: scale(0.96);
        }

        .page-turn {
            animation: pageTurn 0.65s cubic-bezier(0.32, 0.72, 0, 1);
        }

        @keyframes pageTurn {
            0% {
                opacity: 0.2;
                transform: translateY(40px) rotateX(12deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }
    </style>
</head>
<body class="ios-safe">
    <!-- iOS Status Bar -->
    <div class="bg-[#12110f] border-b border-[#3a3630] px-4 py-1 flex items-center justify-between text-xs text-[#8b7f6e]">
        <div class="font-mono">9:41</div>
        <div class="flex items-center gap-1.5">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-full"></i>
        </div>
    </div>

    <!-- Dark Vintage Masthead -->
    <div class="vintage-paper border-b border-[#3a3630] px-4 pt-7 pb-5 overflow-hidden">
        <div class="max-w-2xl mx-auto flex flex-col items-center w-full">
            <div class="flex items-center justify-center w-full gap-2 sm:gap-4">
                <div class="hidden sm:block h-px flex-1 bg-gradient-to-r from-transparent to-[#8b5e3c]"></div>
                <h1 class="masthead text-[#e8d9c2]">AETHER</h1>
                <div class="hidden sm:block h-px flex-1 bg-gradient-to-l from-transparent to-[#8b5e3c]"></div>
            </div>
            <div class="-mt-2">
                <span class="masthead-daily font-black text-[#e8d9c2]">DAILY</span>
            </div>
            
            <div class="mt-3 text-center">
                <span id="current-date" class="font-semibold text-[#c5b8a3] text-sm tracking-[1.5px]"></span>
            </div>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        
        <!-- BREAKING FRONT PAGE HERO -->
        <div id="hero-section" class="mt-5 mb-6"></div>

        <!-- CATEGORY WIDGETS -->
        <div class="mt-2 mb-8">
            <div class="section-header px-1 mb-3 text-center">SECTIONS</div>
            <div class="grid grid-cols-5 gap-2">
                <button onclick="openCategoryPage('AGENTS')" class="category-widget vintage-paper rounded-2xl py-4 text-center active:bg-[#2a2824]">
                    <div class="text-[#8b5e3c] text-xl"><i class="fa-solid fa-robot"></i></div>
                    <div class="text-xs font-semibold tracking-wider mt-1.5">AGENTS</div>
                </button>
                <button onclick="openCategoryPage('COMMUNITY')" class="category-widget vintage-paper rounded-2xl py-4 text-center active:bg-[#2a2824]">
                    <div class="text-[#8b5e3c] text-xl"><i class="fa-solid fa-users"></i></div>
                    <div class="text-xs font-semibold tracking-wider mt-1.5">COMMUNITY</div>
                </button>
                <button onclick="openCategoryPage('MODELS')" class="category-widget vintage-paper rounded-2xl py-4 text-center active:bg-[#2a2824]">
                    <div class="text-[#8b5e3c] text-xl"><i class="fa-solid fa-robot"></i></div>
                    <div class="text-xs font-semibold tracking-wider mt-1.5">MODELS</div>
                </button>
                <button onclick="openCategoryPage('RESEARCH')" class="category-widget vintage-paper rounded-2xl py-4 text-center active:bg-[#2a2824]">
                    <div class="text-[#8b5e3c] text-xl"><i class="fa-solid fa-flask"></i></div>
                    <div class="text-xs font-semibold tracking-wider mt-1.5">RESEARCH</div>
                </button>
                <button onclick="openCategoryPage('TOOLS')" class="category-widget vintage-paper rounded-2xl py-4 text-center active:bg-[#2a2824]">
                    <div class="text-[#8b5e3c] text-xl"><i class="fa-solid fa-tools"></i></div>
                    <div class="text-xs font-semibold tracking-wider mt-1.5">TOOLS</div>
                </button>
            </div>
        </div>
    </div>

    <!-- Category Page -->
    <div id="category-page" onclick="closeCategoryPage()" class="hidden fixed inset-0 bg-[#12110f] z-[200] overflow-y-auto">
        <div onclick="event.stopImmediatePropagation()" class="max-w-2xl mx-auto">
            <div class="vintage-paper border-b border-[#3a3630] sticky top-0 z-10 safe-area-top safe-area-x pb-4">
                <button onclick="closeCategoryPage()" class="category-back-btn text-[#8b5e3c] font-semibold active:bg-[#2a2824]">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>MAIN PAGE</span>
                </button>
                <div class="text-center mt-1">
                    <div id="category-page-title" class="font-serif text-xl tracking-widest text-[#e8d9c2]"></div>
                    <div id="category-page-subtitle" class="text-xs text-[#8b7f6e] mt-1 tracking-[2px]"></div>
                </div>
            </div>
            <div id="category-articles" class="px-4 pt-4 pb-12 safe-area-bottom safe-area-x"></div>
        </div>
    </div>

    <!-- Article Detail Modal -->
    <div id="modal" onclick="hideModal()" class="hidden fixed inset-0 bg-black/90 z-[300] flex items-end md:items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" 
             class="vintage-paper w-full max-w-2xl md:mx-auto md:rounded-t-3xl md:mt-8 md:mb-8 rounded-t-3xl max-h-[94vh] overflow-hidden flex flex-col border border-[#3a3630]">
            
            <div class="flex items-center justify-between px-5 py-4 border-b border-[#3a3630]">
                <button onclick="hideModal()" class="font-semibold text-[#8b5e3c]">CLOSE</button>
                <div class="font-serif tracking-widest text-sm text-[#8b7f6e]">THE AETHER DAILY</div>
                <div></div>
            </div>
            
            <div id="modal-content" class="flex-1 overflow-y-auto px-6 py-7 text-[15px] leading-relaxed text-[#e8d9c2]"></div>
            
            <div class="border-t border-[#3a3630] bg-[#1f1d1a]">
                <div class="flex justify-between px-5 pt-3">
                    <button onclick="navigateArticle(-1)" id="prev-btn"
                            class="flex items-center gap-2 text-sm text-[#8b5e3c] hover:text-[#e8d9c2] transition-colors px-3 py-2">
                        <i class="fa-solid fa-chevron-left"></i>
                        <span>PREV</span>
                    </button>
                    <button onclick="navigateArticle(1)" id="next-btn"
                            class="flex items-center gap-2 text-sm text-[#8b5e3c] hover:text-[#e8d9c2] transition-colors px-3 py-2">
                        <span>NEXT</span>
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
                
                <div class="p-5 pt-2">
                    <button onclick="openOnX()" id="x-button"
                            class="flex items-center justify-center w-full py-3.5 bg-[#e8d9c2] hover:bg-[#d4c3a8] active:bg-[#c5b8a3] transition-colors rounded-2xl">
                        <i class="fa-brands fa-x-twitter text-[#12110f] text-3xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function setDate() {
            const el = document.getElementById('current-date');
            const d = new Date();
            el.textContent = d.toLocaleDateString('en-US', { 
                weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' 
            }).toUpperCase();
        }

        let articles = [];
        let feedEdition = null;

        function formatLikes(likes) {
            return likes >= 1000 ? `${(likes / 1000).toFixed(1)}k` : likes.toLocaleString();
        }

        function getHeroArticle() {
            return articles.find((article) => article.isHero) ?? articles[0];
        }

        function renderHero() {
            const hero = getHeroArticle();
            const heroSection = document.getElementById('hero-section');
            if (!hero || !heroSection) {
                return;
            }

            heroSection.innerHTML = `
                <div onclick="showArticle(${hero.id})" class="cursor-pointer">
                    <div class="vintage-paper article-card rounded-2xl overflow-hidden border border-[#3a3630]">
                        <div class="h-52 bg-[#12110f] flex items-center justify-center relative">
                            <div class="text-center">
                                <div class="text-[#e8d9c2] text-6xl mb-1 opacity-80">
                                    <i class="fa-solid fa-newspaper"></i>
                                </div>
                                <div class="inline-block px-4 py-1 bg-[#8b5e3c] text-[#e8d9c2] text-xs font-bold tracking-[2px]">BREAKING • FRONT PAGE</div>
                            </div>
                            <div class="absolute bottom-4 right-4 bg-black/70 text-[#e8d9c2] text-xs px-3 py-px rounded flex items-center gap-1.5 font-medium">
                                <i class="fa-brands fa-x-twitter"></i>
                                <span>${formatLikes(hero.likes)}</span>
                            </div>
                        </div>

                        <div class="px-6 pt-5 pb-6">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-xs font-bold px-3 py-px bg-[#8b5e3c] text-[#e8d9c2] tracking-wider rounded">${hero.category}</span>
                            </div>

                            <h2 class="vintage-headline text-4xl leading-none text-[#e8d9c2]">
                                ${hero.headline}
                            </h2>
                            <p class="mt-3 text-lg text-[#c5b8a3]">${hero.subheadline}</p>

                            <div class="flex items-center justify-between mt-5 text-sm">
                                <div class="font-medium text-[#e8d9c2]">
                                    ${hero.author} <span class="text-[#8b5e3c]">• ${hero.timestamp}</span>
                                </div>
                                <div class="flex items-center gap-1 text-red-600 font-semibold">
                                    <i class="fa-solid fa-heart"></i>
                                    <span>${formatLikes(hero.likes)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadArticles() {
            const response = await fetch('data/articles.json');
            if (!response.ok) {
                throw new Error(`Failed to load articles: ${response.status}`);
            }

            const feed = await response.json();
            articles = feed.articles ?? [];
            feedEdition = feed.edition ?? null;
            renderHero();
        }

        let currentArticle = null;
        let currentCategory = null;
        let openedFromCategory = false;

        function openCategoryPage(category) {
            currentCategory = category;
            openedFromCategory = false;
            
            const page = document.getElementById('category-page');
            const titleEl = document.getElementById('category-page-title');
            const subtitleEl = document.getElementById('category-page-subtitle');
            const articlesContainer = document.getElementById('category-articles');

            titleEl.textContent = category;
            subtitleEl.textContent = 'TOP STORIES';

            const categoryArticles = articles
                .filter(a => a.category === category)
                .sort((a, b) => b.likes - a.likes);

            let html = '';
            categoryArticles.forEach(article => {
                html += `
                    <div onclick="showArticleFromCategory(${article.id})" class="vintage-paper article-card rounded-2xl px-5 py-5 mb-2 cursor-pointer border border-[#3a3630]">
                        <div class="flex justify-between items-start mb-2">
                            <span class="px-3 py-px text-xs font-bold tracking-widest bg-[#e8d9c2] text-[#12110f] rounded">${article.category}</span>
                            <div class="flex items-center gap-1 text-red-600 text-sm font-semibold">
                                <i class="fa-solid fa-heart"></i>
                                <span>${formatLikes(article.likes)}</span>
                            </div>
                        </div>
                        
                        <h3 class="vintage-headline text-2xl leading-none text-[#e8d9c2] pr-4">${article.headline}</h3>
                        
                        <p class="mt-3 text-[14.5px] text-[#c5b8a3] line-clamp-3">${article.summary}</p>
                        
                        <div class="flex items-center justify-between mt-4 text-xs">
                            <div>
                                <span class="font-semibold text-[#e8d9c2]">${article.author}</span>
                                <span class="text-[#8b5e3c]"> • ${article.timestamp}</span>
                            </div>
                            <span class="text-[#8b5e3c] font-medium">${article.handle}</span>
                        </div>
                    </div>
                `;
            });

            articlesContainer.innerHTML = html;
            page.style.display = 'block';
            page.classList.add('page-turn');
            setTimeout(() => page.classList.remove('page-turn'), 700);
        }

        function closeCategoryPage() {
            document.getElementById('category-page').style.display = 'none';
        }

        function showArticleFromCategory(id) {
            openedFromCategory = true;
            closeCategoryPage();
            setTimeout(() => showArticle(id), 180);
        }

        function showArticle(id) {
            currentArticle = articles.find(a => a.id === id);
            if (!currentArticle) return;
            
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            
            content.innerHTML = `
                <div>
                    <span class="px-4 py-1 text-xs font-bold tracking-widest bg-[#e8d9c2] text-[#12110f] rounded">${currentArticle.category}</span>
                </div>
                
                <h1 class="vintage-headline text-4xl leading-none mt-4 text-[#e8d9c2]">
                    ${currentArticle.headline}
                </h1>
                
                <p class="mt-2 text-2xl text-[#c5b8a3] font-medium tracking-tight">${currentArticle.subheadline}</p>
                
                <div class="flex justify-between items-center my-7 text-sm border-y border-[#3a3630] py-4">
                    <div>
                        <div class="font-bold">${currentArticle.author}</div>
                        <div class="text-[#8b5e3c]">${currentArticle.handle}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[#8b7f6e]">${currentArticle.timestamp}</div>
                        <div class="flex items-center justify-end gap-1 mt-0.5 text-red-600 font-bold">
                            <i class="fa-solid fa-heart"></i>
                            <span>${currentArticle.likes.toLocaleString()}</span>
                        </div>
                    </div>
                </div>
                
                <div class="prose text-[#e8d9c2] leading-[1.7]">
                    <p>${currentArticle.summary}</p>
                    <div class="mt-8 text-xs text-[#8b7f6e] border-t border-[#3a3630] pt-4">
                        This dispatch was sourced from X and reflects the most discussed developments in artificial intelligence.
                    </div>
                </div>
            `;
            
            document.getElementById('x-button').style.display = 'flex';
            updateNavButtons();
            modal.style.display = 'flex';
        }
        
        function updateNavButtons() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            if (!currentArticle) return;
            
            const currentIndex = articles.findIndex(a => a.id === currentArticle.id);
            prevBtn.style.opacity = currentIndex > 0 ? '1' : '0.3';
            prevBtn.style.pointerEvents = currentIndex > 0 ? 'auto' : 'none';
            nextBtn.style.opacity = currentIndex < articles.length - 1 ? '1' : '0.3';
            nextBtn.style.pointerEvents = currentIndex < articles.length - 1 ? 'auto' : 'none';
        }

        function navigateArticle(direction) {
            if (!currentArticle) return;
            const currentIndex = articles.findIndex(a => a.id === currentArticle.id);
            const newIndex = currentIndex + direction;
            if (newIndex >= 0 && newIndex < articles.length) {
                showArticle(articles[newIndex].id);
            }
        }
        
        function hideModal() {
            document.getElementById('modal').style.display = 'none';
            if (openedFromCategory && currentCategory) {
                setTimeout(() => {
                    openCategoryPage(currentCategory);
                    openedFromCategory = false;
                }, 200);
            }
        }
        
        function openOnX() {
            if (currentArticle?.xURL) {
                window.open(currentArticle.xURL, '_blank');
            }
        }

        async function init() {
            setDate();
            try {
                await loadArticles();
                console.log(`%c[Aether Daily] Edition ${feedEdition ?? '—'} loaded.`, 'color:#8b7f6e');
            } catch (error) {
                console.error('[Aether Daily] Failed to load articles:', error);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
